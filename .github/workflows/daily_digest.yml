name: Daily AI News Digest

on:
  schedule:
    # 04:30 UTC is exactly 10:00 AM IST
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  run-aggregator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Restore ChromaDB cache from previous runs to maintain deduplication history
      - name: Restore ChromaDB cache
        uses: actions/cache@v4
        with:
          path: outputs/chroma_db
          key: chromadb-${{ github.run_number }}-${{ github.run_id }}
          restore-keys: |
            chromadb-

      - name: Create outputs directories
        run: mkdir -p outputs/newsletters outputs/logs outputs/chroma_db

      - name: Run news aggregator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          CHROMADB_PATH: outputs/chroma_db
          LOG_LEVEL: INFO
        run: |
          python main.py

      # Commit and push the generated newsletters back to the repository as an archive
      - name: Commit and push generated newsletters
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/newsletters/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: archive generated newsletters" && git push)
