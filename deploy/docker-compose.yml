version: "3.8"

services:
  ai-news-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../outputs:/app/outputs
      - ../config:/app/config
    restart: unless-stopped
    command: python main.py

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../outputs:/app/outputs
      - ../config:/app/config
    restart: unless-stopped
    command: python deploy/cron_scheduler.py
