services:
  - type: worker
    name: ai-news-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python deploy/cron_scheduler.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_RECIPIENTS
        sync: false
      - key: CHROMADB_PATH
        value: ./outputs/chroma_db
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.0"
